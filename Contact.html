<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: linear-gradient( 180deg, 
    #000000 0%, 
    #05050a 45%, 
    #0c0c1e 80%, 
    #1a1a2e 100%
  );
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contact-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .contact-card h2 {
            margin-bottom: 25px;
            color: #333;
            font-weight: 700;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.9s;
        }

        .contact-item:hover {
            transform: translateY(-5px);
        }

        
        .gmail {
            background-color: #fff0f0;
            color: #d44638;
        }
        .gmail:hover { background-color: #fde8e8; }

        
        .phone {
            background-color: #f0fdf4;
            color: #16a34a;
        }
        .phone:hover { background-color: #dcfce7; }

        
        .facebook {
            background-color: #eff6ff;
            color: #1877f2;
        }
        .facebook:hover { background-color: #dbeafe; }

        .icon {
            font-size: 20px;
            margin-right: 15px;
        }

        .details {
            font-weight: 500;
            font-size: 20px;
        }
    </style>
</head>
<body style="background:linear-gradient(
    180deg, 
    #000000 0%,

    #1a1a2e 100%
  );
  background-attachment: fixed; 
  color: #ffffff; 
  font-family: 'Segoe UI', Roboto, sans-serif;">

    <div class="contact-card" style="background: black;">
        <h2 style="font-size: 50px;color: white;font-family: elephant">Contacts</h2>

        <a href="g-mail:saqlainsahu279@gmail.com" class="contact-item gmail">
            <span class="icon" >✉️</span>
            <span class="details">saqlainsahu279@gmail.com</span>
        </a>

        <a href="tel:+923236415307" class="contact-item phone">
            <span class="icon">📞</span>
            <span class="details">+92 323-6415307</span>
        </a>

        <a href="https://facebook.com/yourprofile" target="_blank" class="contact-item facebook">
            <span class="icon">👥</span>
            <span class="details">Facebook Profile</span>
        </a>
    </div>
<div align="right" style="padding-top:600px;">

</body>
</html>
