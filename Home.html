<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Projects | Saqlain</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 35%, #581c87 70%, #9333ea 100%);
            color: white;
            min-height: 100vh;
        }

        
        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 10px 5%;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-weight: 800;
            color: darkred;
            font-size: clamp(24px, 5vw, 40px);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: darkred; }

        
        .project-container {
            max-width: 1200px;
            margin: 120px auto 50px; 
            padding: 0 20px;
            display: grid;
            
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            grid-gap: 25px;
        }

        .card {
            text-decoration: none;
            display: block;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(147, 51, 234, 0.4);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
        }

        
        @media (max-width: 768px) {
            header { padding: 10px 15px; }
            
            nav { display: none; } 

            .project-container {
                grid-template-columns: 1fr; 
                margin-top: 80px;
                grid-gap: 20px;
            }
            
            .logo-text { font-size: 24px; }
        }
    </style>
</head>
<body>

<header>
